apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingestion-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/amrmeta1/cashflow.git
    targetRevision: HEAD
    path: infra/k8s/base
    directory:
      include: ingestion-service.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
