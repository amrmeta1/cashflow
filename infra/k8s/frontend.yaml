apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cashflow-dev
  labels:
    app: frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/cashflow/frontend:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.TadFuq.ai"
        - name: NEXT_PUBLIC_TENANT_API_URL
          value: "https://api.TadFuq.ai/api/tenant"
        - name: NEXT_PUBLIC_INGESTION_API_URL
          value: "https://api.TadFuq.ai/api/ingestion"
        - name: NEXT_PUBLIC_APP_NAME
          value: "CashFlow.ai"
        - name: NEXTAUTH_URL
          value: "https://app.TadFuq.ai"
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: frontend-secrets
              key: nextauth-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cashflow-dev
  labels:
    app: frontend
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: frontend
