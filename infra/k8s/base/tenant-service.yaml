apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-service
  labels:
    app: tenant-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tenant-service
  template:
    metadata:
      labels:
        app: tenant-service
    spec:
      containers:
      - name: tenant-service
        image: 747253121951.dkr.ecr.us-east-1.amazonaws.com/cashflow/tenant-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: DB_SSLMODE
          value: "require"
        - name: AUTH_ISSUER_URL
          value: "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_y3LJvYSPU"
        - name: AUTH_JWKS_URL
          value: "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_y3LJvYSPU/.well-known/jwks.json"
        - name: AUTH_AUDIENCE
          value: "662qj072e235r9f3bcfv7pup96"
        - name: NATS_URL
          value: ""
        - name: OTEL_ENABLED
          value: "false"
        - name: SERVER_PORT
          value: "8080"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-service
spec:
  type: LoadBalancer
  selector:
    app: tenant-service
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
